version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/apps/api"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/apps/ia"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule: { interval: "weekly" }
  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule: { interval: "weekly" }
  - package-ecosystem: "docker"
    directory: "/apps/ia"
    schedule: { interval: "weekly" }

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
