version: '3.8'

services:
  postgres:
    build:
      context: ../docker/postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - vaccin-track-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - vaccin-track-network
    restart: unless-stopped

  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/api/Dockerfile
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: ${APP_URL}
      SMS_GATEWAY_KEY: ${SMS_GATEWAY_KEY}
      IA_SERVICE_URL: http://ia:8000
    depends_on:
      - postgres
      - redis
    volumes:
      - api_storage:/var/www/html/storage
      - api_logs:/var/www/html/storage/logs
    networks:
      - vaccin-track-network
    restart: unless-stopped

  web:
    build:
      context: ../../apps/web
      dockerfile: ../../infra/docker/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${APP_URL}/api
      NODE_ENV: production
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${APP_URL}
    depends_on:
      - api
    networks:
      - vaccin-track-network
    restart: unless-stopped

  ia:
    build:
      context: ../../apps/ia
      dockerfile: ../../infra/docker/ia/Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENVIRONMENT: production
      MODEL_PATH: /app/ml/artifacts/model_v1.pkl
    depends_on:
      - postgres
      - redis
    volumes:
      - ia_models:/app/ml/artifacts
      - ia_logs:/app/logs
    networks:
      - vaccin-track-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - web_logs:/var/log/nginx
    depends_on:
      - api
      - web
      - ia
    networks:
      - vaccin-track-network
    restart: unless-stopped

  worker:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/api/Dockerfile
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_ENV: production
      SMS_GATEWAY_KEY: ${SMS_GATEWAY_KEY}
      IA_SERVICE_URL: http://ia:8000
    depends_on:
      - postgres
      - redis
    volumes:
      - api_storage:/var/www/html/storage
      - api_logs:/var/www/html/storage/logs
    networks:
      - vaccin-track-network
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

  scheduler:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/api/Dockerfile
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_ENV: production
    depends_on:
      - postgres
      - redis
    volumes:
      - api_storage:/var/www/html/storage
      - api_logs:/var/www/html/storage/logs
    networks:
      - vaccin-track-network
    restart: unless-stopped
    command: php artisan schedule:work

volumes:
  postgres_data:
  redis_data:
  api_storage:
  api_logs:
  web_logs:
  ia_models:
  ia_logs:

networks:
  vaccin-track-network:
    driver: bridge
